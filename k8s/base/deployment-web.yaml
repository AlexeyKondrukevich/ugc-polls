apiVersion: apps/v1
kind: Deployment
metadata:
  name: ugc-polls-web
  namespace: ugc-polls
  labels:
    app.kubernetes.io/name: ugc-polls
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ugc-polls
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ugc-polls
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: ugc-polls-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: web
          # image: ghcr.io/your-org/ugc-polls:latest
          image: ugc-polls:prod
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          command:
            - gunicorn
            - config.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "1"
            # - --threads
            # - "2"
            # - --timeout
            # - "120"
            # - --max-requests
            # - "10000"
            # - --max-requests-jitter
            # - "1000"
          envFrom:
            - configMapRef:
                name: ugc-polls-config
            - secretRef:
                name: ugc-polls-secret
          readinessProbe:
            httpGet:
              path: /health/ready/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live/
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ugc-polls
              app.kubernetes.io/component: web
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ugc-polls
                    app.kubernetes.io/component: web
