apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ugc-polls
  namespace: ugc-polls
  labels:
    app.kubernetes.io/name: ugc-polls
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          # - path: /static
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: ugc-polls-web
          #       port:
          #         number: 8080
          # - path: /media
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: ugc-polls-web
          #       port:
          #         number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ugc-polls-web
                port:
                  number: 80
