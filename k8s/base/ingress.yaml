apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ugc-polls
  namespace: ugc-polls
  labels:
    app.kubernetes.io/name: ugc-polls
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ugc-polls-web
                port:
                  number: 80
